name: 24/7 Viral Clip Automation

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube URL (Leave empty to use urls.txt)'
        required: false
      layout:
        description: 'Video Layout'
        required: true
        default: 'letterbox'
      viral_mode:
        description: 'Viral Speed (y/n)'
        required: true
        default: 'y'
  schedule:
    - cron: '0 */3 * * *'

jobs:
  process_clips:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          sudo pip install -U yt-dlp

      - name: Install Node Dependencies
        run: npm install

      - name: Load YouTube Cookies (if secret exists)
        run: |
          if [ -n "${{ secrets.YT_COOKIES }}" ]; then
            echo "${{ secrets.YT_COOKIES }}" > cookies.txt
            echo "🍪 Cookies loaded successfully."
          else
            echo "⏭️ No cookies secret found, skipping."
          fi

      - name: Run Viral Clip Analyzer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GDRIVE_SERVICE_ACCOUNT_BASE64: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_BASE64 }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          # Detect if we should use --drip mode
          # Use drip if it's a schedule OR if the manual URL is blank
          if [ "${{ github.event_name }}" == "schedule" ] || [ -z "${{ github.event.inputs.youtube_url }}" ]; then
            echo "💧 Running in Drip-Feed mode (checking urls.txt)..."
            node analyzer.js --drip "${{ github.event.inputs.layout }}" "${{ github.event.inputs.viral_mode }}"
          else
            echo "🤖 Running in Manual mode for URL: ${{ github.event.inputs.youtube_url }}"
            node analyzer.js "${{ github.event.inputs.youtube_url }}" "${{ github.event.inputs.layout }}" "${{ github.event.inputs.viral_mode }}"
          fi

      - name: Save Progress (Commit State)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add state.json urls.txt
          git commit -m "chore: update drip-feed state [skip ci]" || echo "No changes to commit"
          git push
